name: Alpine Android Editor CI

on:
  push:
    branches: [ main, dev, master ]
  pull_request:
    branches: [ main, dev, master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      - name: Cache Android NDK & SDK
        uses: actions/cache@v4
        with:
          path: |
            ~/.android/manual-sdk
            /usr/local/lib/android/sdk/ndk
          key: ${{ runner.os }}-android-ndk-sdk

      - name: Decode or Generate Debug Keystore
        run: |
          if [ -f "debug.keystore.base64" ]; then
            echo "Decoding existing debug.keystore.base64..."
            base64 -d debug.keystore.base64 > debug.keystore
          else
            echo "debug.keystore.base64 not found, generating a fallback debug.keystore..."
            keytool -genkey -v -keystore debug.keystore -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Android Debug,O=Android,C=US"
          fi

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 9.3.1

      - name: Run Build and Test Tasks
        run: gradle assembleDebug testDebugUnitTest --continue

      - name: Archive APK Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: app/build/outputs/apk/debug/*.apk
